name: Claude Code

on:
  issues:
    types: [opened, labeled]
  issue_comment:
    types: [created]

jobs:
  claude:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write

    # Only run on issues (not PRs), or when @claude is mentioned in a comment
    if: |
      (github.event_name == 'issues') ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude'))

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Claude Code
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

          # Project-specific instructions for Claude
          custom_instructions: |
            This is LarsWorld, a procedural world generator built with TypeScript, Lit web components, and Express.

            ## Project Setup
            Dependencies are already installed. The project uses Node.js 18.

            ## Quality bar — the project must be in a clean, working state before you commit
            - No lint errors, no TypeScript errors, no test failures
            - The project must build and run correctly end-to-end
            - All code you touch must match the surrounding style and conventions
            - Fix any code style issues, anti-patterns, or bugs you introduce or encounter in files you change
            - Do not leave console.log statements, dead code, or TODO comments behind

            ## Required checks — run in order, all must pass
            ```
            npm run lint        # ESLint — 0 errors required; auto-fix with: npm run lint:fix
            npm run build       # TypeScript compilation + rollup bundle
            npm run test:unit   # Unit tests (~60s)
            CHROME_PATH=/root/.cache/ms-playwright/chromium-1194/chrome-linux/chrome npm run test:unit:components
            npm run test:e2e    # E2E Playwright tests (auto-starts servers on ports 3000/3001)
            ```

            If ports 3000 or 3001 are in use before E2E tests, free them first:
            ```
            fuser -k 3000/tcp 2>/dev/null; fuser -k 3001/tcp 2>/dev/null
            ```

            If any check fails, fix the root cause — do not skip or work around checks.

            ## Key project structure
            - src/map-generator/   — Core world generation algorithm
            - src/server/          — Express API server
            - web/components/      — Lit web components (UI)
            - test/                — Unit and E2E tests

            ## World generator changes
            If you change anything in src/map-generator/:
            1. Run npm run test:unit
            2. Run npm run test:generate-pngs to regenerate reference images
            3. Commit the updated test/map-images/ files

            ## Code style
            - TypeScript throughout with strict types — no `any` unless unavoidable
            - ESLint enforced — run lint:fix after changes
            - Keep changes focused and minimal; don't refactor unrelated code
            - Write clear, descriptive commit messages

          # Allow Claude to run project commands
          allowed_tools: "Bash,Edit,Write,Read,Glob,Grep"
