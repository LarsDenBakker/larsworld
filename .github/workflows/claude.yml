name: Claude Code

on:
  issues:
    types: [opened, labeled]
  issue_comment:
    types: [created]

jobs:
  claude:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write

    # Only run on issues (not PRs), or when @claude is mentioned in a comment
    if: |
      (github.event_name == 'issues') ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude'))

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Claude Code
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

          # Project-specific instructions for Claude
          custom_instructions: |
            This is LarsWorld, a procedural world generator built with TypeScript, Lit web components, and Express.

            ## Project Setup
            Dependencies are already installed. The project uses Node.js 18.

            ## Required checks before committing
            Run these in order — all must pass:
            ```
            npm run lint        # ESLint — must have 0 errors
            npm run build       # TypeScript compilation + rollup bundle
            npm run test:unit   # Unit tests (~60s)
            ```

            Fix any lint errors with: npm run lint:fix

            ## Key project structure
            - src/map-generator/   — Core world generation algorithm
            - src/server/          — Express API server
            - web/components/      — Lit web components (UI)
            - test/                — Unit and E2E tests

            ## World generator changes
            If you change anything in src/map-generator/:
            1. Run npm run test:unit
            2. Run npm run test:generate-pngs to regenerate reference images
            3. Commit the updated test/map-images/ files

            ## Style
            - TypeScript throughout (strict types)
            - ESLint enforced — run lint:fix if needed
            - Keep changes focused and minimal
            - Write clear, descriptive commit messages

          # Allow Claude to run project commands
          allowed_tools: "Bash,Edit,Write,Read,Glob,Grep"
